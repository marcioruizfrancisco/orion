services:

  example:

    image: ${EXAMPLE_IMAGE}

    container_name: ${EXAMPLE_CONTAINER_NAME}

    hostname: ${EXAMPLE_HOSTNAME}

    restart: unless-stopped

    ports:

      - "${EXAMPLE_PORT}:80"


    volumes:

      - ${EXAMPLE_WEB_PATH}:/usr/share/nginx/html:ro


    healthcheck:

      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost"
        ]

      interval: 10s

      timeout: 5s

      retries: 5

      start_period: 10s


    networks:

      - orion-network



networks:

  orion-network:

    external: true
